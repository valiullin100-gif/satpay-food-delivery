version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: satpay_postgres
    environment:
      POSTGRES_DB: satpay_food
      POSTGRES_USER: satpay
      POSTGRES_PASSWORD: satpay_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: satpay_backend
    environment:
      DATABASE_URL: postgresql://satpay:satpay_password@postgres:5432/satpay_food
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: satpay_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
